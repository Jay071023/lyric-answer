<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>猜盐 · 今日歌词答案</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
.container {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  padding: 24px 0 8px;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin-bottom: 24px;
}
.card {
  background: #1a1a2e;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  border: 1px solid #2a2a40;
}
.card-title {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.answer-title {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
  line-height: 1.3;
}
.answer-author {
  font-size: 16px;
  color: #a78bfa;
  margin-bottom: 16px;
}
.stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: #888;
}
.stats span { color: #e0e0e0; font-weight: 600; }
.lyrics-box {
  max-height: 300px;
  overflow-y: auto;
  line-height: 1.8;
  font-size: 14px;
  color: #ccc;
}
.lyrics-box::-webkit-scrollbar { width: 4px; }
.lyrics-box::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}
.btn-primary:active { opacity: 0.8; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.error {
  color: #f87171;
  text-align: center;
  padding: 20px;
  font-size: 14px;
}
.loading {
  text-align: center;
  padding: 40px;
  color: #888;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #2a2a40;
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.date-picker {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.date-picker input {
  flex: 1;
  background: #1a1a2e;
  border: 1px solid #2a2a40;
  border-radius: 10px;
  padding: 10px 14px;
  color: #e0e0e0;
  font-size: 14px;
}
.date-picker input:focus { outline: none; border-color: #667eea; }
.footer {
  text-align: center;
  font-size: 12px;
  color: #444;
  padding: 20px;
}
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🎵 猜盐歌词</h1>
  <p class="subtitle">每日歌词答案查询</p>

  <div class="date-picker">
    <input type="date" id="dateInput">
    <button class="btn btn-primary" id="fetchBtn" style="flex:0 0 auto;padding:10px 20px;width:auto">查询</button>
  </div>

  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <div>加载中...</div>
  </div>

  <div id="result"></div>
  <div id="error" class="error hidden"></div>
</div>

<div class="footer">数据来源: xiaoce.fun · 仅用于个人测试</div>

<script>
const BASE = 'https://xiaoce.fun';
const dateInput = document.getElementById('dateInput');
const fetchBtn = document.getElementById('fetchBtn');
const resultEl = document.getElementById('result');
const loadingEl = document.getElementById('loading');
const errorEl = document.getElementById('error');

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function toApiDate(dateStr) {
  return dateStr.replace(/-/g, '');
}

dateInput.value = todayStr();
dateInput.max = todayStr();

async function fetchAnswer(dateStr) {
  const apiDate = toApiDate(dateStr);
  loadingEl.classList.remove('hidden');
  resultEl.innerHTML = '';
  errorEl.classList.add('hidden');
  fetchBtn.disabled = true;

  try {
    const r = await fetch(`${BASE}/api/v0/quiz/daily/lyric/get?date=${apiDate}`);
    const d = await r.json();

    if (!d.success || !d.data || !d.data.data) {
      throw new Error(d.errorMessage || '当天暂无数据');
    }

    const inner = d.data.data;
    const paragraphs = inner.content?.paragraphs || [];
    const lyrics = paragraphs.flat().join('\n');

    resultEl.innerHTML = `
      <div class="card">
        <div class="card-title">今日歌词答案</div>
        <div class="answer-title">${escapeHtml(inner.title || '?')}</div>
        <div class="answer-author">${escapeHtml(inner.author || '?')}</div>
        <div class="stats">
          <div>答对 <span>${d.data.success || 0}</span></div>
          <div>放弃 <span>${d.data.giveUp || 0}</span></div>
        </div>
      </div>
      ${lyrics ? `
      <div class="card">
        <div class="card-title">完整歌词</div>
        <div class="lyrics-box">${escapeHtml(lyrics)}</div>
      </div>` : ''}
    `;
  } catch (e) {
    errorEl.textContent = e.message;
    errorEl.classList.remove('hidden');
  } finally {
    loadingEl.classList.add('hidden');
    fetchBtn.disabled = false;
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

fetchBtn.addEventListener('click', () => {
  const val = dateInput.value;
  if (val) fetchAnswer(val);
});

fetchAnswer(todayStr());
</script>
</body>
</html>
